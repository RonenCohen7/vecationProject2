server {
    listen 80;
    server_name mackalink.com www.mackalink.com localhost;
    
    location /{
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;

    }

    location /api {
        proxy_pass http://gateway-service:4003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-Ip $remote_addr;
    }

    location /images {
        proxy_pass http://gateway-service:4003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-Ip $remote_addr;
    }
}